<div class="calendar-grid">

	<h1>Is it Christmas yet?</h1>
	<h2>{{ isTodayChristmas ? "Yes" : "Nope" }}</h2>

	<h1>How many days till Christmas?</h1>
	<h2>{{ daysTillChristmas }} days</h2>

</div>

<div class="snow">
	@for (snowflake of snowflakes; track snowflake) {
		<div class="snowflake"></div>
		}
</div>
