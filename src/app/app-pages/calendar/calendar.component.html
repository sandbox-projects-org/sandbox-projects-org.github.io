<div class="calendar-grid">

	<h2>Is it Christmas yet?</h2>
	<p>{{ isTodayChristmas ? "Yes" : "No" }}</p>

	<h2>How many days till Christmas?</h2>
	<p>{{ daysTillChristmas }}</p>

</div>

<div class="snow">
	@for (snowflake of snowflakes; track snowflake) {
		<div class="snowflake"></div>
		}
</div>
